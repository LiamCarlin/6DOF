; PlatformIO configuration for ESP32 joint controller
; Framework: Arduino
; Board: ESP32 DevKit V1 (generic esp32dev)
;
; USAGE — flash a specific joint:
;     pio run -e joint1 -t upload      (NODE_ID=1)
;     pio run -e joint2 -t upload      (NODE_ID=2)
;
;   To add more joints, duplicate a [env:jointN] section and change NODE_ID.

; ---------- shared settings ----------
[common]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
build_flags =
    -DSERIAL_DEBUG=1

; ---------- Joint 1 ----------
[env:joint1]
extends = common
build_flags =
    ${common.build_flags}
    -DNODE_ID=1
    -DCAN_TERMINATION=1       ; end-of-bus → 120 Ω

; ---------- Joint 2 ----------
[env:joint2]
extends = common
build_flags =
    ${common.build_flags}
    -DNODE_ID=2
    -DCAN_TERMINATION=0       ; middle of bus — no termination

