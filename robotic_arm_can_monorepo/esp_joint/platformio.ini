; PlatformIO configuration for ESP32 joint controller
; Framework: Arduino
; Board: ESP32 DevKit V1 (generic esp32dev)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Build flags
build_flags =
    -DNODE_ID=1
    -DCAN_TERMINATION=1       ; 1 = 120 Ω termination enabled on this node
    -DSERIAL_DEBUG=1          ; 1 = enable Serial debug prints

; Libraries (Wire is built-in to Arduino-ESP32)
lib_deps =

; Upload / monitor
upload_speed = 921600
